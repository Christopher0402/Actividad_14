<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Calculadora Actividad 14</title>
    <style>
        body { font-family: sans-serif; text-align: center; background: #f0f2f5; padding: 50px; }
        .box { background: white; padding: 30px; border-radius: 10px; display: inline-block; box-shadow: 0 4px 10px rgba(0,0,0,0.1); }
        /* Estilos para tu logo personalizado */
        .logo { width: 200px; max-height: 100px; object-fit: contain; margin-bottom: 20px; }
        input, select { margin: 10px; padding: 8px; border-radius: 5px; border: 1px solid #ccc; }
        button { padding: 10px 20px; cursor: pointer; border-radius: 5px; border: none; color: white; font-weight: bold; }
        .btn-green { background: #28a745; }
        .btn-blue { background: #007bff; }
        .btn-orange { background: #fd7e14; }
    </style>
</head>
<body>

    <div class="box">
        <img src="{{ url_for('static', filename='logotecmi.jpeg') }}" alt="Mi Logo" class="logo">
        
        <h2>Calculadora de Christopher</h2>

        <form method="POST">
            <input type="text" name="val1" placeholder="Valor A" required>
            <select name="op">
                <option value="+">+</option><option value="-">-</option>
                <option value="*">*</option><option value="/">/</option>
                <option value="AND">AND</option><option value="OR">OR</option>
            </select>
            <input type="text" name="val2" placeholder="Valor B" required>
            <br>
            <button type="submit" name="tipo" value="aritmetica" class="btn-green">Aritmética</button>
            <button type="submit" name="tipo" value="binaria" class="btn-blue">Binaria</button>
            <button type="submit" name="tipo" value="logica" class="btn-orange">Lógica</button>
        </form>

        {% if resultado is not none %}
            <h3 style="margin-top: 20px;">Resultado: {{ resultado }}</h3>
        {% endif %}
    </div>

</body>
</html>
